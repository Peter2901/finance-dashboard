<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="logo">₹ MyFinance</div>
  <div class="accounts" id="header-accounts"></div>
  <button class="btn-sm" onclick="syncSMS()">↻ Sync SMS</button>
</header>

<main class="grid">

  <!-- Daily Limit Card -->
  <section class="card hero">
    <div class="label">Today's spending limit</div>
    <div class="hero-amount" id="today-limit">₹—</div>
    <div class="hero-row">
      <span id="today-spent">₹0 spent</span>
      <span class="badge-green" id="today-remaining">₹— left</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="rollover-note" id="rollover-note"></div>

    <div class="quick-add">
      <input type="number"  id="qa-amount"   placeholder="Amount (₹)" step="0.01"/>
      <input type="text"    id="qa-merchant" placeholder="Merchant"/>
      <select id="qa-cat">
        <option>Other</option>
        <option>Groceries</option>
        <option>Food</option>
        <option>Transport</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Health</option>
      </select>
      <button class="btn-primary" onclick="addSpend()">+ Add</button>
    </div>
  </section>

  <!-- Chart -->
  <section class="card">
    <div class="label">7-day history</div>
    <canvas id="chart" height="160"></canvas>
  </section>

  <!-- Recent Transactions -->
  <section class="card">
    <div class="label">Recent transactions</div>
    <div id="tx-list"></div>
  </section>

  <!-- Budgets -->
  <section class="card">
    <div class="label">Monthly budgets</div>
    <div id="budget-list"></div>
  </section>

  <!-- Loans -->
  <section class="card">
    <div class="label">Upcoming loan payments</div>
    <div id="loan-list"></div>
    <button class="btn-sm" style="margin-top:12px;width:100%" onclick="toggleLoanForm()">+ Add loan</button>
    <div id="loan-form" style="display:none;margin-top:12px;display:none">
      <input type="text"   id="lf-lender"     placeholder="Lender"/>
      <input type="number" id="lf-principal"   placeholder="Principal (₹)"/>
      <input type="number" id="lf-outstanding" placeholder="Outstanding (₹)"/>
      <input type="number" id="lf-emi"         placeholder="EMI (₹)"/>
      <input type="date"   id="lf-date"/>
      <input type="number" id="lf-foreclosure" placeholder="Foreclosure amount (₹)"/>
      <button class="btn-primary" style="width:100%;margin-top:4px" onclick="saveLoan()">Save</button>
    </div>
  </section>

  <!-- OCR Upload -->
  <section class="card">
    <div class="label">Upload loan screenshot (OCR)</div>
    <div class="upload-zone" onclick="document.getElementById('ocr-file').click()"
         ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <div style="font-size:28px">📎</div>
      <div style="color:var(--muted);font-size:13px;margin-top:6px">Tap to upload image</div>
    </div>
    <input type="file" id="ocr-file" accept="image/*" style="display:none" onchange="runOCR(this.files[0])"/>
    <div id="ocr-result"></div>
  </section>

</main>

<script src="/static/js/app.js"></script>
</body>
</html>
